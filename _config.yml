title: Minwoo Kim
description: Personal website of Minwoo (James) Kim, M.S. student in Computer Science & Engineering at Seoul National University.
url: "https://miinukim.github.io"
baseurl: ""
lang: en
icon: favicon.svg
navbar_fixed: true
footer_fixed: true
enable_darkmode: false
enable_navbar_social: true

author:
  name: Minwoo Kim

first_name: Minwoo
middle_name: James
last_name: Kim

email: myfirstexp@snu.ac.kr
github_username: miinukim

remote_theme: alshedivat/al-folio@v0.5.0

plugins:
  - jekyll-remote-theme

collections:
  projects:
    output: true
    permalink: /projects/:path/

defaults:
  - scope:
      path: ""
      type: projects
    values:
      layout: page

markdown: kramdown
highlighter: rouge
highlight_theme_light: github
highlight_theme_dark: native

include:
  - _pages

